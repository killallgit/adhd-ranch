version: "3"

# Include in your root Taskfile.yaml:
#   includes:
#     ralph:
#       taskfile: ralph/Taskfile.yaml
#       dir: '{{.ROOT_DIR}}'

tasks:
  default:
    desc: "Run Ralph AFK agent"
    cmds:
      - ralph/ralph.sh

  dry:
    desc: "Dry run — show plan state without calling claude"
    cmds:
      - ralph/ralph.sh --dry-run

  status:
    desc: "Print current plan"
    cmds:
      - cat ralph/PLAN.md

  init:
    desc: "Bootstrap ralph/ for this project (run once)"
    cmds:
      - ralph/init.sh

  reset:
    desc: "Reset an issue to queued. Usage: task ralph:reset -- 033"
    cmds:
      - |
        python3 - "ralph/PLAN.md" "{{.CLI_ARGS}}" <<'EOF'
        import sys, re
        path, num = sys.argv[1:]
        text = open(path).read()
        new = re.sub(
            rf'(^## {re.escape(num)}\n(?:.*\n)*?)status: \S+',
            rf'\g<1>status: queued',
            text, flags=re.MULTILINE
        )
        open(path, 'w').write(new)
        print(f"Reset {num} to queued")
        EOF
