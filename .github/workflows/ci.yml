name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: task ci
        run: task ci
